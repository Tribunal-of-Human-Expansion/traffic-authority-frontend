apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-authority-frontend
  namespace: default
  labels:
    app: traffic-authority-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: traffic-authority-frontend
  template:
    metadata:
      labels:
        app: traffic-authority-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/tribunal-of-human-expansion/traffic-authority-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-authority-frontend
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: traffic-authority-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
